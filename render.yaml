services:
  - type: web
    name: fingpt-api
    env: node
    rootDir: server/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: JWT_SECRET
        sync: false
